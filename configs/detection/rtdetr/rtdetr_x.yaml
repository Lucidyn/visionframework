# RT-DETR-x（HGNet）：纯 PyTorch 实现；官方 rtdetr-x.pt 经 convert_ultralytics_rtdetr_hg 转为 .pth。
# 使用官方预训练权重时须遵守 Ultralytics AGPL-3.0，见 NOTICE。
task: detection

backbone:
  type: RTDETRHGBackbone
  variant: x

head:
  type: RTDETRHGDecoder
  variant: x

postprocess:
  conf: 0.5
  input_size: 640
  max_det: 300
  # input_layout: rgb  # 仅当输入 ndarray 已是 RGB（PIL/plt）时使用；默认 bgr 与 cv2.imread 一致

