task: segmentation
algorithm: YOLO26Segmenter

backbone:
  type: YOLOBackbone
  depth: 1.00
  width: 1.00
  max_channels: 512
  sppf_cv1_act: false
  sppf_residual: true
  c3k2_12_c3k: true
  bottleneck_k: 3

neck:
  type: YOLOPAN
  in_channels: [512, 512, 512]
  out_channels: [256, 512, 512]
  depth: 1.00
  c3k: true
  a2c2f: true
  bottleneck_k: 3

head:
  type: YOLO26SegmentHead
  in_channels: [256, 512, 512]
  num_classes: 80
  reg_max: 1
  nm: 32
  npr: 256

postprocess:
  conf: 0.35
  iou: 0.45
  imgsz: 640
  end2end: true
